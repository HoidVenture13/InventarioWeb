<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="40%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cyanPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="bluePink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="420" rx="20" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="70" x2="800" y2="70" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="0" y1="140" x2="800" y2="140" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="800" y2="210" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="800" y2="280" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="420" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="420" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="420" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="420" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="420" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="420" stroke="#22d3ee" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="420" stroke="#22d3ee" stroke-width="0.5"/>
  </g>

  <!-- Large decorative circles -->
  <circle cx="680" cy="90" r="120" stroke="#22d3ee" stroke-width="0.5" fill="none" opacity="0.15"/>
  <circle cx="680" cy="90" r="80" stroke="#818cf8" stroke-width="0.5" fill="none" opacity="0.1"/>
  <circle cx="680" cy="90" r="40" stroke="#c084fc" stroke-width="0.5" fill="none" opacity="0.08"/>

  <circle cx="120" cy="340" r="100" stroke="#38bdf8" stroke-width="0.5" fill="none" opacity="0.12"/>
  <circle cx="120" cy="340" r="60" stroke="#a855f7" stroke-width="0.5" fill="none" opacity="0.08"/>

  <!-- Interconnected nodes network -->
  <g filter="url(#glow)">
    <!-- Connection lines -->
    <line x1="160" y1="100" x2="240" y2="180" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
    <line x1="240" y1="180" x2="200" y2="280" stroke="#818cf8" stroke-width="1.5" opacity="0.4"/>
    <line x1="200" y1="280" x2="120" y2="220" stroke="#c084fc" stroke-width="1.5" opacity="0.4"/>
    <line x1="120" y1="220" x2="160" y2="100" stroke="#22d3ee" stroke-width="1.5" opacity="0.3"/>
    <line x1="240" y1="180" x2="340" y2="130" stroke="#38bdf8" stroke-width="1.5" opacity="0.35"/>
    <line x1="340" y1="130" x2="400" y2="240" stroke="#818cf8" stroke-width="1.5" opacity="0.35"/>
    <line x1="200" y1="280" x2="300" y2="320" stroke="#c084fc" stroke-width="1.5" opacity="0.3"/>

    <!-- Nodes -->
    <circle cx="160" cy="100" r="10" fill="url(#nodeGrad1)" opacity="0.9"/>
    <circle cx="160" cy="100" r="16" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0.3"/>

    <circle cx="240" cy="180" r="14" fill="url(#nodeGrad3)" opacity="0.9"/>
    <circle cx="240" cy="180" r="22" stroke="#c084fc" stroke-width="1" fill="none" opacity="0.3"/>

    <circle cx="200" cy="280" r="10" fill="url(#nodeGrad2)" opacity="0.9"/>
    <circle cx="200" cy="280" r="16" stroke="#818cf8" stroke-width="1" fill="none" opacity="0.3"/>

    <circle cx="120" cy="220" r="8" fill="url(#nodeGrad1)" opacity="0.8"/>
    <circle cx="120" cy="220" r="13" stroke="#22d3ee" stroke-width="0.8" fill="none" opacity="0.25"/>

    <circle cx="340" cy="130" r="9" fill="url(#nodeGrad2)" opacity="0.85"/>
    <circle cx="340" cy="130" r="14" stroke="#818cf8" stroke-width="0.8" fill="none" opacity="0.25"/>

    <circle cx="400" cy="240" r="12" fill="url(#nodeGrad3)" opacity="0.9"/>
    <circle cx="400" cy="240" r="19" stroke="#c084fc" stroke-width="1" fill="none" opacity="0.3"/>

    <circle cx="300" cy="320" r="7" fill="url(#nodeGrad1)" opacity="0.75"/>
  </g>

  <!-- Floating dots (data particles) -->
  <g filter="url(#glow)">
    <circle cx="480" cy="80" r="3" fill="#22d3ee" opacity="0.6"/>
    <circle cx="520" cy="140" r="2" fill="#818cf8" opacity="0.5"/>
    <circle cx="460" cy="190" r="3" fill="#c084fc" opacity="0.55"/>
    <circle cx="550" cy="110" r="2.5" fill="#38bdf8" opacity="0.6"/>
    <circle cx="440" cy="140" r="2" fill="#22d3ee" opacity="0.5"/>
    <circle cx="500" cy="200" r="2" fill="#c084fc" opacity="0.45"/>
    <circle cx="580" cy="180" r="3" fill="#818cf8" opacity="0.5"/>
    <circle cx="530" cy="250" r="2" fill="#22d3ee" opacity="0.4"/>
  </g>

  <!-- Hexagon icon -->
  <g transform="translate(580, 260)" filter="url(#glow)">
    <polygon points="30,0 60,17 60,52 30,69 0,52 0,17" fill="none" stroke="url(#cyanPurple)" stroke-width="2" opacity="0.7"/>
    <polygon points="30,8 52,21 52,48 30,61 8,48 8,21" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
    <circle cx="30" cy="35" r="5" fill="#22d3ee" opacity="0.8"/>
  </g>

  <!-- Diamond shapes -->
  <g transform="translate(100, 60)" filter="url(#glow)">
    <rect x="0" y="0" width="20" height="20" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.4" transform="rotate(45 10 10)"/>
  </g>
  <g transform="translate(350, 350)" filter="url(#glow)">
    <rect x="0" y="0" width="16" height="16" rx="2" fill="none" stroke="#c084fc" stroke-width="1.2" opacity="0.4" transform="rotate(45 8 8)"/>
  </g>

  <!-- Central accent line -->
  <line x1="400" y1="300" x2="400" y2="340" stroke="url(#bluePink)" stroke-width="2" opacity="0.5" filter="url(#glow)"/>

  <!-- Title text -->
  <text x="400" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="800" fill="url(#bluePink)" filter="url(#glowStrong)" letter-spacing="1">Arellano Acosta Ixchel</text>

  <!-- Subtitle -->
  <text x="400" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b" letter-spacing="2">SISTEMA DE GESTION DE INVENTARIO</text>
</svg>
