<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-header bg-primary text-white text-center rounded-top-4 py-3">
          <h4 class="mb-0">
            <i class="me-2"></i>
            {{ esEdicion() ? 'Editar' : 'Nueva' }} Categoría
          </h4>
        </div>
        <div class="card-body p-4">
          @if (cargando() && esEdicion()) {
            <div class="text-center py-5">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
              </div>
              <p class="mt-2 text-muted">Cargando categoría...</p>
            </div>
          } @else {
            <form (ngSubmit)="onSubmit()" #categoriaForm="ngForm">
              <!-- Nombre -->
              <div class="mb-3">
                <label for="nombreCategoria" class="form-label fw-semibold">Nombre</label>
                <input
                  type="text"
                  id="nombreCategoria"
                  name="nombreCategoria"
                  class="form-control form-control-lg"
                  placeholder="Ej: Electrónica"
                  maxlength="50"
                  required
                  [ngModel]="categoriaActual().nombreCategoria"
                  (ngModelChange)="actualizarNombre($event)"
                />
              </div>

              <!-- Descripción -->
              <div class="mb-4">
                <label for="descripcionCategoria" class="form-label fw-semibold">Descripción</label>
                <textarea
                  id="descripcionCategoria"
                  name="descripcionCategoria"
                  class="form-control"
                  rows="3"
                  placeholder="Describe la categoría..."
                  maxlength="100"
                  required
                  [ngModel]="categoriaActual().descripcionCategoria"
                  (ngModelChange)="actualizarDescripcion($event)"
                ></textarea>
              </div>

              <!-- Botones -->
              <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button
                  type="button"
                  class="btn btn-outline-secondary btn-lg"
                  [routerLink]="['/listaDeCategoria']"
                >
                  Cancelar
                </button>
                <button
                  type="submit"
                  class="btn btn-primary btn-lg"
                  [disabled]="cargando()"
                >
                  @if (cargando()) {
                    <span class="spinner-border spinner-border-sm me-2"></span>
                  }
                  {{ esEdicion() ? 'Actualizar' : 'Registrar' }}
                </button>
              </div>
            </form>
          }
        </div>
      </div>
    </div>
  </div>
</div>
