<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
      <div class="form-card">
        <div class="form-card-header">
          <div class="form-header-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </div>
          <h4>
            {{ esEdicion() ? 'Editar' : 'Nueva' }} Categoria
          </h4>
        </div>

        <div class="form-card-body">
          @if (cargando() && esEdicion()) {
            <div class="text-center py-5">
              <div class="spinner-border" role="status" style="width: 2.5rem; height: 2.5rem;">
                <span class="visually-hidden">Cargando...</span>
              </div>
              <p class="mt-3 text-secondary">Cargando categoria...</p>
            </div>
          } @else {
            <form (ngSubmit)="onSubmit()" #categoriaForm="ngForm">
              <!-- Nombre -->
              <div class="mb-4">
                <label for="nombreCategoria" class="form-label">Nombre de la Categoria</label>
                <input
                  type="text"
                  id="nombreCategoria"
                  name="nombreCategoria"
                  class="form-control form-control-lg"
                  placeholder="Ej: Electronica"
                  maxlength="50"
                  required
                  [ngModel]="categoriaActual().nombreCategoria"
                  (ngModelChange)="actualizarNombre($event)"
                />
              </div>

              <!-- Descripcion -->
              <div class="mb-4">
                <label for="descripcionCategoria" class="form-label">Descripcion</label>
                <textarea
                  id="descripcionCategoria"
                  name="descripcionCategoria"
                  class="form-control"
                  rows="3"
                  placeholder="Describe la categoria..."
                  maxlength="100"
                  required
                  [ngModel]="categoriaActual().descripcionCategoria"
                  (ngModelChange)="actualizarDescripcion($event)"
                ></textarea>
              </div>

              <!-- Botones -->
              <div class="d-grid gap-2 d-md-flex justify-content-md-end pt-2">
                <button
                  type="button"
                  class="btn btn-outline-secondary btn-lg"
                  [routerLink]="['/listaDeCategoria']"
                >
                  Cancelar
                </button>
                <button
                  type="submit"
                  class="btn btn-primary btn-lg"
                  [disabled]="cargando()"
                >
                  @if (cargando()) {
                    <span class="spinner-border spinner-border-sm me-2"></span>
                  }
                  {{ esEdicion() ? 'Actualizar' : 'Registrar' }}
                </button>
              </div>
            </form>
          }
        </div>
      </div>
    </div>
  </div>
</div>
