<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
      <div class="calc-card">
        <div class="calc-header">
          <div class="calc-header-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="8" y2="10.01"/><line x1="12" y1="10" x2="12" y2="10.01"/><line x1="16" y1="10" x2="16" y2="10.01"/><line x1="8" y1="14" x2="8" y2="14.01"/><line x1="12" y1="14" x2="12" y2="14.01"/><line x1="16" y1="14" x2="16" y2="14.01"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
          </div>
          <h4>{{ titulo }}</h4>
        </div>

        <div class="calc-body">
          <!-- Numero 1 -->
          <div class="mb-3">
            <label for="num1" class="form-label">Numero 1</label>
            <input
              type="number"
              id="num1"
              class="form-control form-control-lg text-center"
              placeholder="0"
              [ngModel]="numero1()"
              (ngModelChange)="numero1.set($event)"
            />
          </div>

          <!-- Numero 2 -->
          <div class="mb-4">
            <label for="num2" class="form-label">Numero 2</label>
            <input
              type="number"
              id="num2"
              class="form-control form-control-lg text-center"
              placeholder="0"
              [ngModel]="numero2()"
              (ngModelChange)="numero2.set($event)"
            />
          </div>

          <!-- Operations -->
          <div class="d-grid gap-2 mb-4">
            <div class="btn-group">
              <button class="btn btn-outline-primary" (click)="sumar()">
                <svg class="me-1" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Sumar
              </button>
              <button class="btn btn-outline-warning" (click)="restar()">
                <svg class="me-1" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Restar
              </button>
              <button class="btn btn-outline-success" (click)="multiplicar()">
                <svg class="me-1" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
                Mult
              </button>
              <button class="btn btn-outline-danger" (click)="dividir()">
                <svg class="me-1" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><circle cx="12" cy="6" r="1.5"/><circle cx="12" cy="18" r="1.5"/></svg>
                Div
              </button>
            </div>
          </div>

          <!-- Result -->
          @if (resultado() !== null) {
            <div class="calc-result">
              <div class="calc-result-label">
                {{ numero1() }} {{ operacion() }} {{ numero2() }}
              </div>
              <div class="calc-result-value">
                {{ resultado() }}
              </div>
            </div>
          } @else if (operacion() === '/') {
            <div class="calc-result calc-result-error">
              No se puede dividir entre cero.
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>
