<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-header bg-info text-white text-center rounded-top-4 py-3">
          <h4 class="mb-0">{{ titulo }}</h4>
        </div>

        <div class="card-body p-4">
          <div class="mb-3">
            <label for="num1" class="form-label fw-semibold">Número 1</label>
            <input
              type="number"
              id="num1"
              class="form-control form-control-lg text-center"
              placeholder="0"
              [ngModel]="numero1()"
              (ngModelChange)="numero1.set($event)"
            />
          </div>

          <div class="mb-4">
            <label for="num2" class="form-label fw-semibold">Número 2</label>
            <input
              type="number"
              id="num2"
              class="form-control form-control-lg text-center"
              placeholder="0"
              [ngModel]="numero2()"
              (ngModelChange)="numero2.set($event)"
            />
          </div>

          <div class="d-grid gap-2 mb-4">
            <div class="btn-group">
              <button class="btn btn-outline-primary" (click)="sumar()">
                Sumar
              </button>
              <button class="btn btn-outline-success" (click)="restar()">
                Restar
              </button>
              <button class="btn btn-outline-danger" (click)="multiplicar()">
                Multiplicar
              </button>
              <button class="btn btn-outline-warning" (click)="dividir()">
                Dividir
              </button>
            </div>
          </div>

          @if (resultado() !== null) {
            <div class="alert alert-info text-center mb-0">
              <small class="text-muted">{{ numero1() }} {{ operacion() }} {{ numero2() }} =</small>
              <div class="fs-3 fw-bold">{{ resultado() }}</div>
            </div>
          } @else if (operacion() === '÷') {
            <div class="alert alert-warning text-center mb-0">
              No se puede dividir entre cero.
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>
